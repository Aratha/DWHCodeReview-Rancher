# Yerel deneme: docker compose up --build
# Ön yüz: http://localhost:8080  |  API doğrudan: http://localhost:8000
# backend/.env gerekli (MSSQL + LLM). Windows’ta SQL/LLM makinedeyse host.docker.internal kullanın.

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped

  web:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "8080:80"
    depends_on:
      - backend
    restart: unless-stopped
