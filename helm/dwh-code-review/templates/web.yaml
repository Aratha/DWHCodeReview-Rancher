apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "dwh-code-review.web.fullname" . }}
spec:
  replicas: {{ .Values.web.replicaCount }}
  selector:
    matchLabels:
      app: {{ include "dwh-code-review.web.fullname" . }}
  template:
    metadata:
      labels:
        app: {{ include "dwh-code-review.web.fullname" . }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
{{ toYaml . | indent 8 }}
      {{- end }}
      containers:
        - name: web
          image: "{{ .Values.web.image.repository }}:{{ .Values.web.image.tag }}"
          imagePullPolicy: {{ .Values.web.image.pullPolicy }}
          ports:
            - containerPort: {{ .Values.web.service.port }}
              name: http
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 6
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 15
            periodSeconds: 20
            timeoutSeconds: 3
            failureThreshold: 3
          resources:
{{ toYaml .Values.web.resources | indent 12 }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "dwh-code-review.web.fullname" . }}
spec:
  type: {{ .Values.web.service.type }}
  selector:
    app: {{ include "dwh-code-review.web.fullname" . }}
  ports:
    - port: {{ .Values.web.service.port }}
      targetPort: http
      protocol: TCP
      name: http
