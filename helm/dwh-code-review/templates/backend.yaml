apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "dwh-code-review.backend.fullname" . }}
spec:
  replicas: {{ .Values.backend.replicaCount }}
  selector:
    matchLabels:
      app: {{ include "dwh-code-review.backend.fullname" . }}
  template:
    metadata:
      labels:
        app: {{ include "dwh-code-review.backend.fullname" . }}
    spec:
      containers:
        - name: backend
          image: "{{ .Values.backend.image.repository }}:{{ .Values.backend.image.tag }}"
          imagePullPolicy: {{ .Values.backend.image.pullPolicy }}
          ports:
            - containerPort: {{ .Values.backend.service.port }}
              name: http
          envFrom:
            - configMapRef:
                name: {{ include "dwh-code-review.backend.configName" . }}
            - secretRef:
                name: {{ include "dwh-code-review.backend.secretName" . }}
          readinessProbe:
            httpGet:
              path: /api/health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 6
          livenessProbe:
            httpGet:
              path: /api/health
              port: http
            initialDelaySeconds: 20
            periodSeconds: 20
            timeoutSeconds: 3
            failureThreshold: 3
          resources:
{{ toYaml .Values.backend.resources | indent 12 }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "dwh-code-review.backend.fullname" . }}
spec:
  type: {{ .Values.backend.service.type }}
  selector:
    app: {{ include "dwh-code-review.backend.fullname" . }}
  ports:
    - port: {{ .Values.backend.service.port }}
      targetPort: http
      protocol: TCP
      name: http
